<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Galeria zdjęć</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <!-- TODO: zmień na własną nazwę galerii -->
    <div class="topbar-brand">
      <span class="brand-dot"></span>
      <span class="brand-name">Galeria zdjęć</span>
    </div>
    <div class="topbar-actions">
      <span id="select-count" class="select-count" hidden></span>
      <button id="deselect-all" class="btn btn-ghost" type="button" hidden>Odznacz wszystko</button>
      <button id="select-all" class="btn btn-ghost" type="button">Zaznacz wszystko</button>
      <button id="download-selected" class="btn btn-yellow" type="button" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Pobierz zaznaczone
      </button>
    </div>
  </div>
</header>

<div class="hero">
  <div class="hero-inner">
    <!-- TODO: dostosuj opis -->
    <h1 class="hero-title">Twoje zdjęcia są gotowe</h1>
    <p class="hero-sub">Kliknij zdjęcie, żeby je powiększyć. Zaznacz wybrane i pobierz je jako ZIP — albo pobierz wszystkie naraz.</p>
    <div class="hero-meta">
      <span id="photo-count" class="meta-pill"></span>
      <button id="download-all" class="btn btn-outline" type="button">
        Pobierz wszystkie (ZIP)
      </button>
    </div>
    <p id="toolbar-status" class="status-bar" role="status" aria-live="polite"></p>
  </div>
</div>

<main class="main">
  <section id="gallery" class="gallery" aria-label="Zdjęcia">
    <p id="loading-state" class="state-msg">Wczytywanie…</p>
  </section>
</main>

<footer class="footer">
  <p>Dodawaj zdjęcia do folderu <code>photos/</code> i rób push — galeria zaktualizuje się automatycznie.</p>
</footer>

<!-- Lightbox -->
<div id="lightbox" class="lightbox" hidden>
  <div class="lb-backdrop"></div>

  <div class="lb-topbar">
    <span id="lb-counter" class="lb-counter"></span>
    <button id="lb-close" class="lb-close" type="button" aria-label="Zamknij">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <div class="lb-stage">
    <button id="lb-prev" class="lb-nav lb-prev" type="button" aria-label="Poprzednie">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <img id="lb-image" src="" alt="">
    <button id="lb-next" class="lb-nav lb-next" type="button" aria-label="Następne">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <div class="lb-bar">
    <div class="lb-info">
      <span id="lb-caption" class="lb-caption"></span>
      <span id="lb-size" class="lb-size"></span>
    </div>
    <a id="lb-download" class="btn-download" download>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Pobierz
    </a>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
