name: Deploy gallery to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rename photos to URL-safe filenames
        run: |
          cd photos
          for f in *; do
            [ -f "$f" ] || continue
            safe=$(echo "$f" | iconv -f UTF-8 -t ASCII//TRANSLIT 2>/dev/null | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/--*/-/g')
            if [ "$f" != "$safe" ]; then
              echo "Renaming: $f -> $safe"
              mv "$f" "$safe"
            fi
          done

      - name: Generate photo manifest
        run: node generate-manifest.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
